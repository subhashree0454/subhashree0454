# 🔥 Daily Streak Maintenance
# ✨ This script automatically commits 5 times a day to maintain your GitHub contribution streak.

name: 🔥 Daily Streak Maintainer

on:
  schedule:
    - cron: "22 1,7,14,20 * * *" # Runs 4 times daily at asymmetrical hours + 1 hour random delay
  workflow_dispatch:              # Allows manual trigger for testing

jobs:
  streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write             # Required to commit to your repo
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⏳ Random Delay
        run: |
          DELAY=$((RANDOM % 3600))
          echo "💤 Sleeping for $DELAY seconds to keep times random..."
          sleep $DELAY

      - name: 📝 Update Contribution Log
        run: |
          MESSAGES=(
            "🔥 maintain: daily contribution streak"
            "✨ chore: update activity log"
            "🚀 feat: automated pulse update"
            "💎 refactor: organic growth sync"
            "🌱 chore: cultivate contribution garden"
            "⚡ tweak: daily energy pulse"
          )
          RAND_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          echo "📅 [$DATE] $RAND_MSG" >> contribution_log.txt
          # Keep only last 100 entries to prevent file from getting too large
          tail -n 100 contribution_log.txt > temp.txt && mv temp.txt contribution_log.txt
          
          echo "✅ Log updated with: $RAND_MSG"
          echo "commit_msg=$RAND_MSG" >> $GITHUB_ENV

      - name: 📤 Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "${{ env.commit_msg }} [skip ci]"
          commit_author: "subhashree0454 <sahusubhashree0454@gmail.com>"
          branch: main
          file_pattern: contribution_log.txt
